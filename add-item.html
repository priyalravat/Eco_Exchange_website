<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Item | Eco Exchange</title>

<link rel="stylesheet" href="style.css">

<style>

/* PAGE */
.add-container{
max-width:700px;
margin:60px auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* TITLE */
.add-container h2{
text-align:center;
margin-bottom:30px;
}

/* INPUTS */
.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:6px;
font-weight:bold;
}

.form-group input,
.form-group select,
.form-group textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
outline:none;
transition:0.3s;
}

.form-group input:focus,
.form-group textarea:focus{
border-color:#27ae60;
box-shadow:0 0 5px rgba(39,174,96,0.5);
}

/* IMAGE PREVIEW */
.preview{
text-align:center;
margin-top:15px;
}

.preview img{
width:200px;
border-radius:10px;
display:none;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* BUTTON */
.add-btn{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#27ae60,#2ecc71);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.add-btn:hover{
transform:scale(1.05);
}

/* SUCCESS */
.success{
text-align:center;
color:green;
margin-top:15px;
display:none;
font-weight:bold;
}

</style>

</head>

<body>

<!-- HEADER -->
<header>
<h1 class="site-title">Eco Exchange</h1>

<nav class="nav-center">
<a href="index.html">Home</a>
<a href="browse-items.html">Browse Items</a>
<a href="add-item.html">Add Item</a>
<a href="login.html">Login</a>
<a href="register.html">Register</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<!-- FORM -->
<section class="add-container">

<h2>📦 Add New Item</h2>

<form id="itemForm">

<div class="form-group">
<label>Item Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Category</label>
<select id="category">
<option>Mobile</option>
<option>Books</option>
<option>Electronics</option>
<option>Accessories</option>
</select>
</div>

<div class="form-group">
<label>Condition</label>
<select id="condition">
<option>New</option>
<option>Good</option>
<option>Used</option>
</select>
</div>

<div class="form-group">
<label>Exchange For</label>
<input type="text" id="exchange" placeholder="Example: Watch">
</div>

<div class="form-group">
<label>Description</label>
<textarea rows="4" id="desc"></textarea>
</div>

<div class="form-group">
<label>Upload Image</label>
<input type="file" id="image" accept="image/*">
</div>

<div class="preview">
<img id="previewImg">
</div>

<button type="submit" class="add-btn">Add Item</button>

<p class="success" id="successMsg">✅ Item Added Successfully!</p>

</form>

</section>

<!-- FOOTER -->
<footer class="footer">

<div class="footer-container">

<div class="footer-box">
<h3>Eco Exchange</h3>
<p>Exchange your items easily.</p>
</div>

<div class="footer-box">
<h3>Quick Links</h3>
<a href="index.html">Home</a>
<a href="browse-items.html">Browse</a>
<a href="contact.html">Contact</a>
</div>

<div class="footer-box">
<h3>Contact</h3>
<p>📧 ecoexchange@gmail.com</p>
<p>📞 +91 9876543210</p>
</div>

</div>

<div class="footer-bottom">
<p>© 2026 Eco Exchange | Designed by Priyal</p>
</div>

</footer>

<script>

/* IMAGE PREVIEW */
document.getElementById("image").addEventListener("change", function(e){

let file = e.target.files[0];
let reader = new FileReader();

reader.onload = function(){
let img = document.getElementById("previewImg");
img.src = reader.result;
img.style.display = "block";
}

if(file){
reader.readAsDataURL(file);
}

});

/* FORM SUBMIT */
document.getElementById("itemForm").addEventListener("submit", function(e){

e.preventDefault();

document.getElementById("successMsg").style.display = "block";

setTimeout(()=>{
document.getElementById("successMsg").style.display = "none";
},2000);

this.reset();
document.getElementById("previewImg").style.display = "none";

});

</script>

</body>
</html>
